version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cymed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cymed_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cymed}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./cymed_python
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 cymed_core.wsgi:application"
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-cymed}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cymed_db}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=cymed.cy-com.com,localhost
      - CORS_ALLOWED_ORIGINS=https://cymed.cy-com.com
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy

  celery:
    build:
      context: ./cymed_python
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A cymed_core worker --loglevel=warning --concurrency=2
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-cymed}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cymed_db}
      - SECRET_KEY=${SECRET_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://cymed.cy-com.com
      - NODE_ENV=production
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/cymed.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - static_files:/app/static:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  static_files:
  media_files:
