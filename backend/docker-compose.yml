services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cymed_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    environment:
      APP_ENV: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cymed
      DB_USERNAME: cymed
      DB_PASSWORD: cymed_secret
      REDIS_HOST: redis
      REDIS_PASSWORD: cymed_redis_secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cymed_network

  nginx:
    image: nginx:1.27-alpine
    container_name: cymed_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - cymed_network

  postgres:
    image: postgres:16-alpine
    container_name: cymed_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cymed
      POSTGRES_USER: cymed
      POSTGRES_PASSWORD: cymed_secret
      PGDATA: /data/postgres
    volumes:
      - cymed_postgres_data:/data/postgres
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cymed -d cymed"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cymed_network

  redis:
    image: redis:7.4-alpine
    container_name: cymed_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass cymed_redis_secret
    volumes:
      - cymed_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cymed_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cymed_network

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: cymed_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - cymed_elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    networks:
      - cymed_network

  minio:
    image: minio/minio:latest
    container_name: cymed_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cymed_minio
      MINIO_ROOT_PASSWORD: cymed_minio_secret
    volumes:
      - cymed_minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - cymed_network

  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cymed_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    environment:
      APP_ENV: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cymed
      DB_USERNAME: cymed
      DB_PASSWORD: cymed_secret
      REDIS_HOST: redis
      REDIS_PASSWORD: cymed_redis_secret
      QUEUE_CONNECTION: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cymed_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: cymed_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - cymed_network

networks:
  cymed_network:
    driver: bridge

volumes:
  cymed_postgres_data:
  cymed_redis_data:
  cymed_elasticsearch_data:
  cymed_minio_data:
