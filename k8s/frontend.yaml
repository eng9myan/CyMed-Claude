apiVersion: apps/v1
kind: Deployment
metadata:
  name: cymed-web
  labels:
    app: cymed-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cymed-web
  template:
    metadata:
      labels:
        app: cymed-web
    spec:
      containers:
      - name: cymed-web
        image: cymed/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://api.cymed.local"
---
apiVersion: v1
kind: Service
metadata:
  name: cymed-web
spec:
  selector:
    app: cymed-web
  ports:
  - port: 80
    targetPort: 3000
