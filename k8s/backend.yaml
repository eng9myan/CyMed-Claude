apiVersion: apps/v1
kind: Deployment
metadata:
  name: cymed-api
  labels:
    app: cymed-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cymed-api
  template:
    metadata:
      labels:
        app: cymed-api
    spec:
      containers:
      - name: cymed-api
        image: cymed/api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: cymed-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cymed-secrets
              key: DATABASE_URL
        - name: CELERY_BROKER_URL
          value: "redis://cymed-redis:6379/0"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cymed-api
spec:
  selector:
    app: cymed-api
  ports:
  - port: 80
    targetPort: 8000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cymed-api-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cymed-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cymed-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cymed-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
