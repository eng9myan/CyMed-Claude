    <line x1="465" y1="175" x2="525" y2="175" stroke="#2c3e50" stroke-width="1.5" style="fill:rgb(0, 0, 0);stroke:rgb(44, 62, 80);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
