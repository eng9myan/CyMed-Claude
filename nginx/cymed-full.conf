upstream cymed_backend  { server backend:8000; }
upstream cymed_frontend { server frontend:3000; }
upstream cymed_erp_engine { server cymed_erp:8069; }

server {
    listen 80;
    server_name _;
    client_max_body_size 200M;

    # ── ERP Engine (rebranded CyMed ERP) ──────────────────────────────────────
    location /erp/ {
        rewrite ^/erp/(.*)$ /$1 break;
        proxy_pass         http://cymed_erp_engine;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ERP JSON-RPC endpoints — frontend bridge talks to these directly
    location /web/ {
        proxy_pass         http://cymed_erp_engine;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ── Django Clinical API ───────────────────────────────────────────────────
    location ~ ^/(api|admin|static-django|media)/ {
        proxy_pass         http://cymed_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Django static
    location /static-django/ {
        alias /app/static/;
        expires 30d;
    }

    # ── Next.js Frontend (everything else) ────────────────────────────────────
    location / {
        proxy_pass         http://cymed_frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
