<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CyMed</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #020617 0%, #0F172A 60%, #1E293B 100%);
      color: white;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 18px;
      background: linear-gradient(135deg, #E67E22, #F39C12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 800;
      color: white;
      box-shadow: 0 20px 60px rgba(230,126,34,0.4);
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }
    .spinner {
      margin-top: 32px;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #E67E22;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">+</div>
  <h1>CyMed</h1>
  <p>Enterprise Healthcare ERP</p>
  <div class="spinner"></div>
</body>
</html>
