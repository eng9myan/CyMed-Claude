name: CyMed Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r cymed_python/requirements.txt
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 cymed_python/ --count --select=E9,F63,F7,F82 --show-source --statistics

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      working-directory: ./cymed_frontend
      run: npm ci
    - name: Build Next.js App
      working-directory: ./cymed_frontend
      run: npm run build

  docker-compose-test:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-frontend]
    steps:
    - uses: actions/checkout@v3
    - name: Build and run Docker Compose
      run: |
        docker-compose up -d --build
        sleep 15
        docker-compose ps
        docker-compose logs
        docker-compose down

  deploy-to-aws:
    runs-on: ubuntu-latest
    needs: [docker-compose-test]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Terraform Apply
      working-directory: ./terraform
      run: |
        terraform init
        terraform apply -auto-approve -var="db_username=${{ secrets.DB_USER }}" -var="db_password=${{ secrets.DB_PASS }}"
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    - name: Build, tag, and push Docker images to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY_BACKEND: cymed-backend
        ECR_REPOSITORY_FRONTEND: cymed-frontend
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest ./cymed_python
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest ./cymed_frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest
