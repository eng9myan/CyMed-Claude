name: CyMed Deploy → AWS → cymed.cy-com.com

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ── 1. Build & push backend image to ECR ─────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/cymed-backend:${{ github.sha }}
          docker build -f cymed_python/Dockerfile -t $IMAGE cymed_python/
          docker push $IMAGE
          docker tag $IMAGE $REGISTRY/cymed-backend:latest
          docker push $REGISTRY/cymed-backend:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── 2. Build & push frontend image to ECR ────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/cymed-frontend:${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://cymed.cy-com.com \
            -f frontend/Dockerfile \
            -t $IMAGE \
            frontend/
          docker push $IMAGE
          docker tag $IMAGE $REGISTRY/cymed-frontend:latest
          docker push $REGISTRY/cymed-frontend:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── 3. Deploy on EC2 via SSM (no open SSH port needed) ───────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: SSM — pull new images & restart containers
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/opt/cymed/redeploy.sh"]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for completion
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done

      - name: Verify deployment
        run: |
          sleep 15
          curl -sf https://cymed.cy-com.com/api/health/ && \
            echo "✅ https://cymed.cy-com.com is live" || \
            echo "⚠️  Health check failed — containers may still be starting"
