name: CyMed Deploy → cymed.cy-com.com

on:
  push:
    branches: [main]

jobs:
  # ── 1. Quick smoke-test the backend builds ────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r cymed_python/requirements.txt
      - name: Syntax check
        run: |
          pip install flake8
          flake8 cymed_python/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── 2. Quick smoke-test the frontend builds ───────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install & build
        run: |
          cd frontend
          npm ci
          NEXT_PUBLIC_API_URL=https://cymed.cy-com.com npm run build

  # ── 3. SSH into server and redeploy ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/cymed

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Rebuilding and restarting containers ---"
            docker compose -f docker-compose.demo.yml --env-file .env \
              up -d --build --remove-orphans

            echo "--- Waiting for backend health ---"
            sleep 10
            docker compose -f docker-compose.demo.yml ps

            echo "--- Done: https://cymed.cy-com.com ---"
